<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Control Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --error: #ef4444;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; color: var(--text-dark);
        }

        .login-card {
            background: var(--card-bg);
            width: 100%; max-width: 400px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.01);
            text-align: center;
        }

        .icon-header {
            width: 60px; height: 60px;
            background: #eef2ff; color: var(--primary);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 24px; margin: 0 auto 20px;
        }

        h1 { font-weight: 600; font-size: 1.5rem; margin-bottom: 8px; }
        p.subtitle { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 25px; }

        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        
        .input-group input {
            width: 100%; padding: 14px 45px 14px 15px;
            background: #f9fafb; border: 1px solid #e5e7eb;
            border-radius: 12px; outline: none; transition: 0.3s; font-size: 0.95rem;
        }
        .input-group input:focus {
            border-color: var(--primary); background: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .toggle-password {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            color: #9ca3af; cursor: pointer; transition: 0.3s;
        }
        .toggle-password:hover { color: var(--text-dark); }

        .btn-login {
            width: 100%; padding: 14px; margin-top: 10px;
            background: var(--primary); color: white;
            border: none; border-radius: 12px; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }
        .btn-login:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-login:disabled { background: #9ca3af; cursor: not-allowed; transform: none; box-shadow: none; }

        .msg-box { font-size: 0.85rem; min-height: 20px; margin-bottom: 15px; font-weight: 500; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="icon-header"><i class="fa-solid fa-lock"></i></div>
    <h1>Welcome Back</h1>
    <p class="subtitle">เข้าสู่ระบบเพื่อควบคุมอุปกรณ์</p>

    <div class="msg-box errorMsg"></div>

    <form onsubmit="event.preventDefault(); handleSigngIN();">
        <div class="input-group">
            <input type="text" placeholder="Username" id="username-input" required />
        </div>
        
        <div class="input-group">
            <input type="password" placeholder="Password" id="password-input" required />
            <i class="fa-solid fa-eye toggle-password"></i>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
    </form>
</div>

<script>
    const IP = window.location.hostname;
    const gateway = `http://${IP}`;

    // Password Toggle
    document.querySelector('.toggle-password').addEventListener('click', function() {
        const input = this.previousElementSibling;
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    async function apiRequest(url, method = 'POST', body = null) {
        try {
            const options = { method: method, headers: {} };
            if (body) {
                options.headers['Content-Type'] = 'application/json';
                options.body = JSON.stringify(body);
            }
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(`Status: ${response.status}`);
            return await response.json();
        } catch (error) {
            console.error('Fetch Failed:', error);
            return null;
        }
    }

    window.onload = function () {
        if (localStorage.getItem('esp32_token')) {
            window.location.href = "/controlPanel/controlPanel.html"; 
        }
    };

    async function handleSigngIN() {
        const userIn = document.querySelector('#username-input').value;
        const passIn = document.querySelector('#password-input').value;
        const errorMsg = document.querySelector('.errorMsg');
        const btn = document.querySelector('#loginBtn');

        btn.innerText = "Checking..."; btn.disabled = true; errorMsg.innerText = "";

        const result = await apiRequest(gateway + '/api/signin', 'POST', { u: userIn, p: passIn, token: localStorage.getItem("esp32_token") || ""});

        if (result && result.status) {
            errorMsg.innerText = "Login Success!";
            errorMsg.style.color = "var(--success)";
            localStorage.setItem('esp32_token', result.okte);
            setTimeout(() => { window.location.href = "/controlPanel/controlPanel.html"; }, 1000);
        } else {
            errorMsg.innerText = "Invalid Username or Password";
            errorMsg.style.color = "var(--error)";
            btn.innerText = "Sign In"; btn.disabled = false;
        }
    }
</script>

</body>
</html>
