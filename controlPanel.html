        <div class="content">
            <div class="btn-close-window" id="close-display">
                <div class="burger-bar">
                    <img src="arrow-down-solid-full.svg" alt="">

            <button class="btn-event" id="btn-clear-display">clear</button>
            <button class="btn-event" id="btn-showImage">showImage</button>
