<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Robot Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    
        body {
            background-color: #121212;
            /* สีพื้นหลังดำด้าน */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    
        .login-wrapper {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
    
        .login-card {
            background-color: #1e1e1e;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #333;
        }
    
        .icon-circle {
            width: 60px;
            height: 60px;
            background: #007bff;
            color: white;
            font-size: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.5);
        }
    
        h2 {
            color: #ffffff;
            margin-bottom: 5px;
        }
    
        p {
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
    
        .input-group {
            margin-bottom: 20px;
        }
    
        input {
            width: 100%;
            padding: 12px 15px;
            background: #2c2c2c;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
    
        input:focus {
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.3);
        }
    
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            /* สีปุ่ม */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
    
        button:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
    
        button:active {
            transform: translateY(0);
        }
    
        .error-msg {
            color: #ff4d4d;
            font-size: 14px;
            margin-bottom: 15px;
            height: 20px;
            /* จองพื้นที่ไว้ */
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="icon-circle">
                🔐
            </div>
            
            <h2>Welcome Back</h2>
            <p>Please login to control the system</p>

            <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
                <div class="input-group">
                    <input type="text" id="username" required placeholder="Username">
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" required placeholder="Password">
                </div>

                <div class="error-msg" id="errorMsg"></div>

                <button type="submit" id="loginBtn">LOGIN</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "";

        // --- ฟังก์ชัน Fetch มาตรฐาน ---
        async function apiRequest(url, method = 'GET', body = null) {
            try {
                const options = { method: method, headers: {} };
                if (body) {
                    options.headers['Content-Type'] = 'application/json';
                    options.body = JSON.stringify(body);
                }
                const response = await fetch(API_URL + url, options);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('Fetch Failed:', error);
                return null;
            }
        }

        // --- ตรวจสอบ Auto Login เมื่อเปิดหน้าเว็บ ---
        window.onload = async function () {
            const token = localStorage.getItem('esp32_token');

            // ถ้ามี Token ให้ลองข้ามไปหน้าหลักเลย (หรือเช็คกับ Server ก่อนก็ได้)
            if (token) {
                console.log("Found token, redirecting...");
                // window.location.href = "control.html"; // เปิดหน้าควบคุม
            }
        };

        // --- ฟังก์ชันกดปุ่ม Login ---
        async function handleLogin() {
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            // 1. เปลี่ยนปุ่มเป็น Loading
            btn.innerText = "Checking...";
            btn.disabled = true;
            errorMsg.innerText = "";

            // 2. ส่งไปเช็คที่ ESP32
            // สมมติ API คือ /api/login ส่ง {u: username, p: password}
            const result = await apiRequest('/api/login', 'POST', { u: userIn, p: passIn });

            // 3. ตรวจสอบผลลัพธ์
            if (result && result.status === 'ok') {
                // ✅ Login สำเร็จ
                errorMsg.style.color = "#4caf50"; // สีเขียว
                errorMsg.innerText = "Login Success!";

                // บันทึก Token (ถ้ามี) หรือแค่จำว่าผ่านแล้ว
                localStorage.setItem('esp32_token', result.token || 'logged_in');

                // รอ 1 วินาทีแล้วเปลี่ยนหน้า
                setTimeout(() => {
                    window.location.href = "control.html"; // ไปหน้าควบคุม
                }, 1000);

            } else {
                // ❌ Login พลาด
                errorMsg.style.color = "#ff4d4d"; // สีแดง
                errorMsg.innerText = "Invalid Username or Password";
                btn.innerText = "LOGIN";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
